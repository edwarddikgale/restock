# Deploy frontend (app/restock) to Firebase Hosting on merge to main
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - "app/restock/**"
      - ".github/workflows/firebase-hosting-merge.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    environment: Prod

    defaults:
      run:
        working-directory: app/restock

    env:
      VITE_API_URL: ${{ secrets.API_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate API URL
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL is not set (from Prod environment)"
            exit 1
          fi

      - name: Build
        run: npm ci && npm run build

      - name: Verify build output exists
        run: |
          test -f dist/index.html || (echo "dist/index.html missing. Check build output path." && exit 1)

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESTOCK_DF4F4 }}
          channelId: live
          projectId: restock-df4f4
          entryPoint: app/restock
