# Deploy frontend (app/restock) to Firebase Hosting on merge to main
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - "app/restock/**"
      - ".github/workflows/firebase-hosting-merge.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    environment: Prod

    defaults:
      run:
        working-directory: app/restock

    env:
      VITE_API_URL: ${{ secrets.API_URL }}
      VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required env
        run: |
          for v in VITE_API_URL VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_APP_ID; do
            if [ -z "${!v}" ]; then echo "$v is not set"; exit 1; fi
          done

      - name: Build
        run: npm ci && npm run build

      - name: Verify build output exists
        run: |
          test -f dist/index.html || (echo "dist/index.html missing. Check build output path." && exit 1)

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESTOCK_DF4F4 }}
          channelId: live
          projectId: restock-df4f4
          entryPoint: app/restock
